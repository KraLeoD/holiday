# .github/workflows/docker-build.yml
#
# Builds a single container image (Fastify API serving the built Expo-web
# bundle) and pushes it to GitHub Container Registry (ghcr.io).
#
#   - Pull requests: build only (validates the Dockerfile), no push.
#   - Pushes to main / version tags: build AND push, with sensible tags.
#
# No extra secrets needed: it authenticates to GHCR with the built-in
# GITHUB_TOKEN. To push somewhere else (private registry, Docker Hub), change
# REGISTRY + the login step and add the credentials as repo secrets.

name: docker-build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # e.g. leon/availability-calendar

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Skip login on PRs from forks (no push happens there anyway).
      - name: Log in to the container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64